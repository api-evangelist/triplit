apis:
  - aid: triplit:http-api
    name: Triplit HTTP API
    description: >-
      RESTful HTTP API for interacting with a Triplit sync server, supporting
      fetch, insert, bulk-insert, update, delete, delete-all, and healthcheck
      operations. Authenticated via JWT Bearer tokens (Service or Anonymous
      tokens). Base URL follows the pattern https://<project-id>.triplit.io.
    humanURL: https://www.triplit.dev/docs/http-api
    baseURL: https://<project-id>.triplit.io
    tags:
      - Database
      - REST
      - Real-time
      - CRUD
    properties:
      - type: Documentation
        url: https://www.triplit.dev/docs/http-api

  - aid: triplit:client-sdk
    name: Triplit Client SDK
    description: >-
      TypeScript/JavaScript client library for interacting with Triplit databases
      locally and remotely. Provides query subscriptions, optimistic updates,
      offline support, and real-time sync via WebSockets. Framework bindings
      available for React, Svelte, Vue, Solid, Angular, and React Native.
    humanURL: https://www.triplit.dev/docs/client
    tags:
      - SDK
      - TypeScript
      - JavaScript
      - Real-time
      - Offline
    properties:
      - type: Documentation
        url: https://www.triplit.dev/docs/client

  - aid: triplit:cli
    name: Triplit CLI
    description: >-
      Command-line interface tool for scaffolding Triplit projects, running the
      local full-stack development environment, managing schemas and migrations,
      and deploying to Triplit Cloud. Installable via npm as @triplit/cli.
    humanURL: https://www.triplit.dev/docs/cli
    tags:
      - CLI
      - Developer Tools
      - DevOps
    properties:
      - type: Documentation
        url: https://www.triplit.dev/docs/cli

