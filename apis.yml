---
aid: triplit
name: Triplit
description: >-
  Triplit is an open-source full-stack database that syncs data between server
  and browser in real-time, combining a client-side store with a server sync
  engine and schema-defined collections. It offers a TypeScript-first SDK for
  building real-time, collaborative, and offline-capable web applications,
  supporting frameworks like React, Svelte, Vue, Solid, Angular, and Vue. Triplit
  provides an HTTP REST API and WebSocket-based sync protocol secured with JWT
  authentication, along with a CLI for scaffolding and managing projects. Developers
  can self-host Triplit on their own infrastructure or deploy via Triplit Cloud.
type: Index
